<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKANAYA JAPON - PRODUCT LIST</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container header-flex-row">
            <img src="images/logo.jpg" alt="SAKANAYA JAPON" class="logo-mini">
            <div class="title-section">
                <div class="title-with-footer">
                    <h2 class="title-main-inline">PRODUCT LIST</h2>
                    <span class="mini-footer">© 2026 SAKANAYA JAPON</span>
                </div>
                <p class="update-date-inline" id="update-date">UPDATE: —</p>
            </div>
            <div class="contact-section-inline">
                <a href="tel:016881370" class="tel-inline-text">📞 016-881-370</a>
                <a href="https://t.me/SAKANAYAJAPON" target="_blank" class="telegram-btn-mini">Telegram</a>
            </div>
        </div>
    </header>

    <!-- 言語切り替え -->
    <div class="lang-bar">
        <button id="lang-jp" class="lang-btn" onclick="setLang('jp')">🇯🇵 日本語</button>
        <button id="lang-en" class="lang-btn" onclick="setLang('en')">🇬🇧 English</button>
    </div>

    <!-- カテゴリ -->
    <nav class="category-nav">
        <button class="nav-btn active" onclick="filterCategory('ALL', this)">ALL</button>
        <button class="nav-btn" onclick="filterCategory('FROZEN', this)">FROZEN</button>
        <button class="nav-btn" onclick="filterCategory('FRESH-WHOLE/SD', this)">FRESH WHOLE/SD</button>
        <button class="nav-btn" onclick="filterCategory('FRESH-DR', this)">FRESH DR</button>
        <button class="nav-btn" onclick="filterCategory('FRESH-FILLET', this)">FRESH FILLET</button>
        <button class="nav-btn" onclick="filterCategory('OIL&SEASONING', this)">OIL &amp; SEASONING</button>
        <button class="nav-btn nav-btn-sake" onclick="filterCategory('SAKE', this)">SAKE</button>
    </nav>

    <!-- 検索 -->
    <div class="search-area">
        <input
            type="text"
            id="search-input"
            placeholder="Search product name..."
            onkeyup="applyFilters()"
        >
    </div>

    <!-- お知らせ -->
    <div class="notice-area">
        <details class="notice-box">
            <summary id="notice-summary-text">【 NOTICE 】 Click to view details</summary>
            <div class="notice-content">
                <div id="notice-body-content"></div>
            </div>
        </details>
    </div>

    <!-- おすすめ -->
    <section id="recommend-section" class="recommend-section hidden">
        <div class="section-header">
            <h3 id="recommend-title">🔥 Today's Recommendation</h3>
        </div>
        <div id="recommend-container" class="container recommend-container"></div>
    </section>

    <!-- 通常商品 -->
    <section class="product-section">
        <div id="product-container" class="container"></div>
    </section>

    <!-- 地図 -->
    <section class="map-section">
        <h3>STORE LOCATION</h3>
        <div class="map-container">
            <iframe
                src="https://www.google.com/maps/embed?pb=..."
                width="100%"
                height="400"
                style="border:0;"
                allowfullscreen=""
                loading="lazy">
            </iframe>
        </div>
    </section>

    <!-- 固定問い合わせボタン -->
    <a
        id="inquiry-floating-btn"
        class="inquiry-floating-btn"
        href="https://t.me/SAKANAYAJAPON"
        target="_blank"
    >
        💬 Inquiry
    </a>

    <!-- 画像モーダル -->
    <div id="image-modal" class="modal" onclick="closeModal()">
        <span class="close-btn">×</span>
        <img class="modal-content" id="modal-img" alt="Product Image">
    </div>

    <!-- 注文バー -->
    <div id="total-bar" class="total-bar">
        <div class="total-content">
           <div class="order-bar-header">
    <span class="total-label" id="order-bar-label">📋 Your Order</span>
</div>

            <div id="cart-items" class="cart-items">
                <p class="cart-empty">No items selected.</p>
            </div>
        </div>

        <div class="order-bar-actions">
            <button onclick="sendOrderTelegram()" class="order-send-btn">
                <span id="order-btn-text">📲 Order via Telegram</span>
            </button>
            <button onclick="clearCart()" class="order-clear-btn" id="order-clear-btn">
                Clear
            </button>
        </div>

        <p class="total-note" id="order-bar-note">* Final price confirmed upon delivery</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
