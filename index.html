<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKANAYA JAPON - PRODUCT LIST</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/logo.jpg">
</head>
<body>
    <header>
        <div class="header-container header-flex-row">
            <img src="images/logo.jpg" alt="SAKANAYA JAPON" class="logo-mini">
            <div class="title-section">
                <div class="title-with-footer">
                    <h2 class="title-main-inline">PRODUCT LIST</h2>
                    <span class="mini-footer">© 2026 SAKANAYA JAPON</span>
                </div>
                <p class="update-date-inline" id="update-date">UPDATE: —</p>
            </div>
            <div class="contact-section-inline">
                <a href="tel:016881370" class="tel-inline-text">📞 016-881-370</a>
            </div>
        </div>
    </header>

    <div class="lang-bar">
        <button id="lang-jp" class="lang-btn" onclick="setLang('jp')">🇯🇵 日本語</button>
        <button id="lang-en" class="lang-btn" onclick="setLang('en')">🇬🇧 English</button>
    </div>

    <nav class="category-nav">
        <button id="cat-all" class="nav-btn active" onclick="filterCategory('ALL', this)">ALL</button>
        <button id="cat-frozen" class="nav-btn" onclick="filterCategory('FROZEN', this)">FROZEN</button>
        <button id="cat-whole" class="nav-btn" onclick="filterCategory('FRESH-WHOLE', this)">FRESH WHOLE</button>
        <button id="cat-fillet" class="nav-btn" onclick="filterCategory('FRESH-FILLET/DR/SD', this)">FRESH FILLET/DR/SD</button>
        <button class="nav-btn" id="cat-vege" onclick="filterCategory('VEGE', this)">VEGETABLE</button>    
        <button id="cat-oil" class="nav-btn" onclick="filterCategory('OIL&SEASONING', this)">OIL & SEASONING</button>
        <button class="nav-btn" id="cat-kitchen" onclick="filterCategory('KITCHEN', this)">KITCHEN SUPPLIES</button>
        <button id="cat-sake" class="nav-btn nav-btn-sake" onclick="filterCategory('SAKE', this)">SAKE</button>
        <button id="cat-waiting" class="nav-btn nav-btn-waiting" onclick="filterCategory('OUT_OF_STOCK', this)">OUT OF STOCK</button>
        <a href="https://t.me/SAKANAYAJAPON" target="_blank" class="header-inquiry-btn" id="inquiry-btn">
        💬 <span id="inquiry-text">INQUIRY</span>　
        </a>
        <div class="cart-wrapper">
            <button id="cart-toggle-btn" class="cart-toggle-btn" onclick="toggleCartPanel()">
                🛒 <span id="cart-count-badge" class="cart-count-badge">0</span>
            </button>

            <div id="cart-panel" class="cart-panel">
                <div class="cart-panel-header">
                    <span class="total-label" id="order-bar-label">📋 Your Order</span>
                    <button class="cart-close-btn" onclick="closeCartPanel()">×</button>
                </div>

<div id="cart-items" class="cart-items">
    <p class="cart-empty">No items selected.</p>
</div>

<div class="cart-notes-wrapper" style="padding: 10px 15px; border-top: 1px solid #eee;">
    <textarea id="cart-notes" style="width: 100%; height: 50px; resize: none; border: 1px solid #ccc; border-radius: 4px; padding: 8px; box-sizing: border-box;" placeholder="メモ (Notes)..."></textarea>
</div>

<div class="order-bar-actions" style="padding: 10px 15px; display: flex; flex-direction: column; gap: 10px;">
    <button onclick="showOrderCheckModal()" class="order-send-btn" style="width: 100%; padding: 15px; background: #333; color: #fff; border: none; border-radius: 6px; font-weight: bold;">ご注文 / Order</button>
    
    <div style="display: flex; gap: 8px;">
        <button onclick="document.getElementById('first-time-modal').style.display='flex'" class="order-send-btn" style="flex: 1; background: #666; font-size: 13px;">初めての方</button>
        <button onclick="clearCart()" class="order-clear-btn" style="flex: 1; font-size: 13px;">クリア</button>
    </div>
</div>
                <div id="first-order-form" class="telegram-order-form" style="display:none; margin-top:12px;">
                <h4 id="form-first-title"></h4>
                <input id="first-store-name" type="text" class="order-input">
                <input id="first-contact-name" type="text" class="order-input">
                <input id="first-phone" type="text" class="order-input">
                <button onclick="submitFirstOrder()" class="order-send-btn" id="btn-submit-first" style="margin-top:10px;"></button>
                </div>

                <div id="repeat-order-form" class="telegram-order-form" style="display:none; margin-top:12px;">
                <h4 id="form-repeat-title"></h4>
                <input id="repeat-phone" type="text" class="order-input">
                <button onclick="submitRepeatOrder()" class="order-send-btn" id="btn-submit-repeat" style="margin-top:10px;"></button>
                </div>

                <p class="total-note" id="order-bar-note"></p>
                <a id="inquiry-floating-btn" class="inquiry-floating-btn" href="https://t.me/SAKANAYAJAPON" target="_blank"></a>
            </div>
        </div>
    </nav>

    <div class="search-area">
        <input type="text" id="search-input" placeholder="Search product name..." onkeyup="applyFilters()">
    </div>

    <div class="notice-area">
        <details class="notice-box">
            <summary id="notice-summary-text">【 NOTICE 】 Click to view details</summary>
            <div class="notice-content">
                <div id="notice-body-content"></div>
            </div>
        </details>
    </div>

    <section id="recommend-section" class="recommend-section hidden">
        <div class="section-header"><h3 id="recommend-title">🔥 Today's Recommendation</h3></div>
        <div id="recommend-container" class="container recommend-container"></div>
    </section>

    <section class="product-section">
        <div id="product-container" class="container"></div>
    </section>

    <div id="image-modal" class="modal" onclick="closeModal()">
        <span class="close-btn">×</span>
        <img class="modal-content" id="modal-img" alt="Product Image">
    </div>

    <script src="script.js"></script>

    <div id="first-time-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:10000; justify-content:center; align-items:center;">
    <div style="background:#fff; width:90%; max-width:400px; padding:25px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.3); position:relative;">
        
        <h3 id="modal-title" style="margin-top:0; border-bottom:2px solid #333; padding-bottom:10px;">新規登録</h3>
        
        <div style="margin-top:15px;">
            <label id="label-shop" style="display:block; font-size:0.8rem; font-weight:bold;">店名</label>
            <input type="text" id="reg-shop-name" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">
            
            <label id="label-staff" style="display:block; font-size:0.8rem; font-weight:bold;">担当者名</label>
            <input type="text" id="reg-staff-name" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">
            
            <label id="label-phone" style="display:block; font-size:0.8rem; font-weight:bold;">電話番号</label>
            <input type="tel" id="reg-phone" placeholder="0123456789" style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ccc; border-radius:4px;">
        </div>
        
        <div style="display:flex; gap:10px;">
            <button id="btn-cancel" onclick="closeFirstTimeModal()" style="flex:1; padding:12px; background:#eee; border:none; border-radius:6px; cursor:pointer;">キャンセル</button>
            <button id="btn-submit" onclick="processFirstTimeRegistration()" style="flex:2; padding:12px; background:#333; color:#fff; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">登録</button>
        </div>
    </div>
</div>
    <div id="order-check-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:10001; justify-content:center; align-items:center;">
    <div style="background:#fff; width:85%; max-width:350px; padding:20px; border-radius:12px; text-align:center;">
        <h3 style="margin-bottom:15px;">注文確認 / Order</h3>
        <p style="font-size:0.9rem;">登録済みの電話番号を入力してください。</p>
        <input type="tel" id="check-phone" placeholder="0123456789" style="width:100%; padding:10px; margin:15px 0; border:1px solid #ccc; border-radius:4px;">
        <div style="display:flex; gap:10px;">
            <button onclick="document.getElementById('order-check-modal').style.display='none'" style="flex:1; padding:10px; background:#eee; border:none; border-radius:6px;">戻る</button>
            <button onclick="finalizeOrderProcess()" style="flex:1; padding:10px; background:#333; color:#fff; border:none; border-radius:6px;">注文を確定</button>
        </div>
    </div>
</div>
</body>
</html>
