<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKANAYA JAPON - PRODUCT LIST</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/logo.jpg">
</head>
<body>
    <header>
        <div class="header-container header-flex-row">
            <img src="images/logo.jpg" alt="SAKANAYA JAPON" class="logo-mini">
            <div class="title-section">
                <div class="title-with-footer">
                    <h2 class="title-main-inline">PRODUCT LIST</h2>
                    <span class="mini-footer">© 2026 SAKANAYA JAPON</span>
                </div>
                <p class="update-date-inline" id="update-date">UPDATE: —</p>
            </div>
            <div class="contact-section-inline">
                <a href="tel:016881370" class="tel-inline-text">📞 016-881-370</a>
                <a href="https://t.me/SAKANAYAJAPON" target="_blank" class="telegram-btn-mini">Telegram</a>
            </div>
        </div>
    </header>

    <!-- 言語切り替え -->
    <div class="lang-bar">
        <button id="lang-jp" class="lang-btn" onclick="setLang('jp')">🇯🇵 日本語</button>
        <button id="lang-en" class="lang-btn" onclick="setLang('en')">🇬🇧 English</button>
    </div>

    <!-- カテゴリ -->
    <nav class="category-nav">
    <button id="cat-all" class="nav-btn active" onclick="filterCategory('ALL', this)">ALL</button>
    <button id="cat-frozen" class="nav-btn" onclick="filterCategory('FROZEN', this)">FROZEN</button>
    <button id="cat-whole" class="nav-btn" onclick="filterCategory('FRESH-WHOLE', this)">FRESH WHOLE</button>
    <button id="cat-dr" class="nav-btn" onclick="filterCategory('FRESH-SD/DR', this)">FRESH SD/DR</button>
    <button id="cat-fillet" class="nav-btn" onclick="filterCategory('FRESH-FILLET', this)">FRESH FILLET</button>
    <button id="cat-oil" class="nav-btn" onclick="filterCategory('OIL&SEASONING', this)">OIL &amp; SEASONING</button>
    <button id="cat-sake" class="nav-btn nav-btn-sake" onclick="filterCategory('SAKE', this)">SAKE</button>
        <div class="cart-wrapper">
    <button id="cart-toggle-btn" class="cart-toggle-btn" onclick="toggleCartPanel()">
        🛒 <span id="cart-count-badge" class="cart-count-badge">0</span>
    </button>

    <div id="cart-panel" class="cart-panel">
        <div class="cart-panel-header">
            <span class="total-label" id="order-bar-label">📋 Your Order</span>
            <button class="cart-close-btn" onclick="closeCartPanel()">×</button>
        </div>

        <div id="cart-items" class="cart-items">
            <p class="cart-empty">No items selected.</p>
        </div>

        <div class="order-bar-actions">
    <button onclick="showFirstOrderForm()" class="order-send-btn">
        初めての方 / Only First Order
    </button>

    <button onclick="showRepeatOrderForm()" class="order-send-btn">
        2回目以降のご注文 / Order
    </button>

    <button onclick="clearCart()" class="order-clear-btn" id="order-clear-btn">
        Clear
    </button>
</div>

<div id="first-order-form" class="telegram-order-form" style="display:none; margin-top:12px;">
    <h4>初めての方 / First Order</h4>
    <input id="first-store-name" type="text" placeholder="Store Name / 店名" class="order-input">
    <input id="first-contact-name" type="text" placeholder="Contact Name / 担当者名" class="order-input">
    <input id="first-phone" type="text" placeholder="Phone Number / 電話番号" class="order-input">

    <div id="first-order-summary" class="order-summary-box"></div>

    <button onclick="submitFirstOrder()" class="order-send-btn" style="margin-top:10px;">
        登録案内を受け取る / Get Registration Guide
    </button>
</div>

<div id="repeat-order-form" class="telegram-order-form" style="display:none; margin-top:12px;">
    <h4>2回目以降のご注文 / Order</h4>
    <input id="repeat-phone" type="text" placeholder="Phone Number / 電話番号" class="order-input">

    <div id="repeat-order-summary" class="order-summary-box"></div>

    <button onclick="submitRepeatOrder()" class="order-send-btn" style="margin-top:10px;">
        Telegramで注文する / Send Order via Telegram
    </button>
</div>

        <p class="total-note" id="order-bar-note">* Final quantity/weight confirmed upon delivery</p>
    </div>
</div>
</nav>

    <!-- 検索 -->
    <div class="search-area">
        <input
            type="text"
            id="search-input"
            placeholder="Search product name..."
            onkeyup="applyFilters()"
        >
    </div>

    <!-- お知らせ -->
    <div class="notice-area">
        <details class="notice-box">
            <summary id="notice-summary-text">【 NOTICE 】 Click to view details</summary>
            <div class="notice-content">
                <div id="notice-body-content"></div>
            </div>
        </details>
    </div>

    <!-- おすすめ -->
    <section id="recommend-section" class="recommend-section hidden">
        <div class="section-header">
            <h3 id="recommend-title">🔥 Today's Recommendation</h3>
        </div>
        <div id="recommend-container" class="container recommend-container"></div>
    </section>

    <!-- 通常商品 -->
    <section class="product-section">
        <div id="product-container" class="container"></div>
    </section>

    <!-- 地図 -->
    <section class="map-section">
        <h3>STORE LOCATION</h3>
        <div class="map-container">
            <iframe
                src="https://www.google.com/maps/embed?pb=..."
                width="100%"
                height="400"
                style="border:0;"
                allowfullscreen=""
                loading="lazy">
            </iframe>
        </div>
    </section>

    <!-- 固定問い合わせボタン -->
    <a
        id="inquiry-floating-btn"
        class="inquiry-floating-btn"
        href="https://t.me/SAKANAYAJAPON"
        target="_blank"
    >
        💬 Inquiry
    </a>

    <!-- 画像モーダル -->
    <div id="image-modal" class="modal" onclick="closeModal()">
        <span class="close-btn">×</span>
        <img class="modal-content" id="modal-img" alt="Product Image">
    </div>
       
    <script src="script.js">

// ←ここに全部貼る

function getCartSummary() {
  const cartItemsContainer = document.getElementById('cart-items');
  const text = cartItemsContainer ? cartItemsContainer.innerText.trim() : '';

  if (!text || text.includes('No items selected.')) {
    return '';
  }

  return text;
}

function showFirstOrderForm() {
  const summary = getCartSummary();

  if (!summary) {
    alert('Please select products first.');
    return;
  }

  document.getElementById('first-order-form').style.display = 'block';
  document.getElementById('repeat-order-form').style.display = 'none';
  document.getElementById('first-order-summary').innerText = summary;
}

function showRepeatOrderForm() {
  const summary = getCartSummary();

  if (!summary) {
    alert('Please select products first.');
    return;
  }

  document.getElementById('repeat-order-form').style.display = 'block';
  document.getElementById('first-order-form').style.display = 'none';
  document.getElementById('repeat-order-summary').innerText = summary;
}

async function submitFirstOrder() {
  const storeName = document.getElementById('first-store-name').value.trim();
  const contactName = document.getElementById('first-contact-name').value.trim();
  const phone = document.getElementById('first-phone').value.trim();
  const summary = getCartSummary();

  if (!storeName || !contactName || !phone || !summary) {
    alert('Please fill in all fields.');
    return;
  }

  alert('初回登録はTelegram Botで /start を行ってください。');
}

async function submitRepeatOrder() {
  const phone = document.getElementById('repeat-phone').value.trim();
  const summary = getCartSummary();

  if (!phone || !summary) {
    alert('Please enter your phone number.');
    return;
  }

  try {
    const response = await fetch('https://telegram-bot-729928920450.asia-northeast1.run.app/order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        mode: 'repeat',
        phone: phone,
        product: summary
      })
    });

    const result = await response.json();

    if (result.status === 'ok') {
      alert('注文を送信しました');
      clearCart();
    } else {
      alert('電話番号未登録です');
    }

  } catch (e) {
    alert('通信エラー');
  }
}
        
    </script>
</body>
</html>
